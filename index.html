<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成长纪念册 | Little One</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f9f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
            max-width: 650px;
            text-align: center;
        }
        h1 {
            color: #6ba8a9;
            margin-bottom: 5px;
            font-size: 2.2em;
        }
        p.subtitle {
            color: #888;
            font-size: 1.1em;
            margin-bottom: 35px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #e5f0f1;
            padding: 25px 20px;
            border-radius: 12px;
            border: 2px dashed #9bc4c5;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(107, 168, 169, 0.2);
        }
        .card h3 {
            margin: 0 0 12px 0;
            color: #356869;
            font-size: 1.3em;
        }
        .card p {
            margin: 0;
            font-size: 0.95em;
            line-height: 1.5;
            color: #555;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.85em;
            color: #aaa;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌟 欢迎来到这个世界 🌟</h1>
    <p class="subtitle">记录生命里每一个闪耀的瞬间</p>

    <div class="card-grid">
        <div class="card">
            <h3>🍼 初次见面</h3>
            <p>在这个小小的身躯里，藏着对世界无限的好奇。点击这里可以替换为宝宝的第一张满月照。</p>
        </div>
        <div class="card">
            <h3>✨ 名字的意义</h3>
            <p>无论是“星野”的辽阔，还是“言初”的纯粹，都承载着长辈们最深切的爱意与期盼。</p>
        </div>
        <div class="card">
            <h3>📸 亲子时光</h3>
            <p>留住那些让人心融化的笑容，还有每天晚上笨拙却温暖的哄睡时刻。</p>
        </div>
        <div class="card">
            <h3>👣 慢慢长大</h3>
            <p>第一次翻身，第一次咿呀学语……每一天都在变得更强壮，一点点探索这个美好的世界。</p>
        </div>
    </div>

    <div class="footer">
        用代码写下的备忘录 · 用心记录爱的点滴
    </div>
</div>

</body>
</html>
